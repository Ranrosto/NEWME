name: Daily push reminders

on:
  schedule:
    # Runs every 15 minutes at OFF-PEAK minutes (7,22,37,52).
    # GitHub queues scheduled jobs, and delays are worst at round times
    # (:00/:15/:30/:45) when everyone else's crons fire. Odd minutes get
    # picked up much faster. The sender script decides who is actually
    # "due" based on each user's timezone.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab to test

# Avoid overlapping runs
concurrency:
  group: push-reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install web-push@^3 @supabase/supabase-js@^2

      - name: Send due reminders
        run: node .github/scripts/send-reminders.js
        env:
          VAPID_PUBLIC:        ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE:       ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT:       ${{ secrets.VAPID_SUBJECT }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
